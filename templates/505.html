{% extends 'base.html' %}
{% load static %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="text-center">
        <div style="font-size: 80px; color: #dc3545; font-weight: 700;">500</div>
        <h1 class="fw-700 mt-3" style="font-size: 28px;">Server Error</h1>
        <p class="text-muted" style="font-size: 16px; max-width: 500px; margin: 10px auto;">
            Something went wrong on our end. We're working to fix it.
        </p>
        <div class="mt-4">
            <a href="{% url 'home:home' %}" class="btn fk-btn-primary px-5 py-2">
                <i class="fas fa-home me-2"></i> Go Home
            </a>
            <a href="javascript:location.reload()" class="btn btn-outline-secondary px-5 py-2 ms-2">
                <i class="fas fa-sync me-2"></i> Try Again
            </a>
        </div>
    </div>
</div>
{% endblock %}
