<!-- templates/400.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}400 - Bad Request{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="text-center">
        <div style="font-size: 80px; color: #17a2b8; font-weight: 700;">400</div>
        <h1 class="fw-700 mt-3" style="font-size: 28px;">Bad Request</h1>
        <p class="text-muted" style="font-size: 16px; max-width: 500px; margin: 10px auto;">
            The request could not be understood by the server.
        </p>
        <p class="text-muted" style="font-size: 14px;">
            <i class="fas fa-exclamation-triangle me-1"></i> Please check your request and try again.
        </p>
        <div class="mt-4">
            <a href="{% url 'home:home' %}" class="btn fk-btn-primary px-5 py-2">
                <i class="fas fa-home me-2"></i> Go Home
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary px-5 py-2 ms-2">
                <i class="fas fa-arrow-left me-2"></i> Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
